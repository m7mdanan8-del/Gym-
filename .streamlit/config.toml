[theme]
# Energetic light "gym motivation" theme — bold orange accents on a warm
# light background. Users can still switch Dark / Light from the app menu
# (top-right ⋮ -> Settings -> Theme); charts adapt automatically.
base = "light"
primaryColor = "#f04e23"
backgroundColor = "#fdfcfa"
secondaryBackgroundColor = "#f6f1ea"
textColor = "#141414"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
