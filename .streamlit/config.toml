[theme]
# The app's single fixed theme: energetic light "gym motivation" look —
# bold orange accents on a warm light background.
base = "light"
primaryColor = "#f04e23"
backgroundColor = "#fdfcfa"
secondaryBackgroundColor = "#f6f1ea"
textColor = "#141414"
font = "sans serif"

[client]
# Hide the developer toolbar so the app always shows its own single theme.
toolbarMode = "minimal"

[server]
headless = true

[browser]
gatherUsageStats = false
