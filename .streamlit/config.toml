[theme]
# Clean light default. Users can switch Dark / Light from the
# app menu (top-right ⋮ -> Settings -> Theme) — charts adapt automatically.
base = "light"
primaryColor = "#2a78d6"
backgroundColor = "#fcfcfb"
secondaryBackgroundColor = "#f0efec"
textColor = "#0b0b0b"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
