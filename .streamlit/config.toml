[theme]
# Professional dark default. Users can switch Dark / Light from the
# app menu (top-right ⋮ -> Settings -> Theme) — charts adapt automatically.
base = "dark"
primaryColor = "#3987e5"
backgroundColor = "#0d0d0d"
secondaryBackgroundColor = "#1a1a19"
textColor = "#ffffff"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
